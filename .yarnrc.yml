# Yarn Berry 4.x Configuration for finance-db

# Use traditional node_modules for compatibility with better-sqlite3
nodeLinker: node-modules

# Disable telemetry for privacy
enableTelemetry: false

# Enable global cache for faster installs across projects
enableGlobalCache: true

# No compression for faster installs (cache space is cheap)
compressionLevel: 0

# Network settings
httpTimeout: 60000
networkConcurrency: 50

# Enable strict SSL
enableStrictSsl: true

# Use Yarn's npm registry
npmRegistryServer: "https://registry.yarnpkg.com"
